<header
  class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 bg-white px-6 py-3 lg:px-10"
>
  <div class="flex items-center gap-8">
    <div routerLink="/" class="flex items-center gap-3 text-slate-900 cursor-pointer">
      <img src="logo/logo.png" alt="logo" class="size-12" />
      <h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">TravelScore</h2>
    </div>
    <div class="hidden lg:flex items-center gap-4">
      <a
        routerLink="review/destinations"
        routerLinkActive="bg-primary text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-slate-900 text-sm font-medium px-3 py-1.5 rounded-xl leading-normal transition-colors cursor-pointer"
        >Destinations</a
      >
      <a
        routerLink="review/foods"
        routerLinkActive="bg-primary text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-slate-900 text-sm font-medium px-3 py-1.5 rounded-xl leading-normal transition-colors cursor-pointer"
        >Food</a
      >
      <a
        routerLink="review/hotels"
        routerLinkActive="bg-primary text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-slate-900 text-sm font-medium px-3 py-1.5 rounded-xl leading-normal transition-colors cursor-pointer"
        >Hotels</a
      >
      <a
        routerLink="review/flights"
        routerLinkActive="bg-primary text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-slate-900 text-sm font-medium px-3 py-1.5 rounded-xl leading-normal transition-colors cursor-pointer"
        >Flights</a
      >
      <a
        routerLink="community"
        routerLinkActive="bg-primary text-white"
        class="text-slate-900 text-sm font-medium px-3 py-1.5 rounded-xl leading-normal transition-colors cursor-pointer"
        >Community</a
      >
    </div>
  </div>
  <div class="flex flex-1 justify-end gap-4 lg:gap-8">
    <label class="hidden sm:flex flex-col min-w-lg h-10 max-w-xl">
      <div
        class="flex w-full flex-1 items-stretch rounded-xl h-full focus-within:ring-2 focus-within:ring-primary/50"
      >
        <div
          class="text-slate-500 flex border-none bg-slate-100 items-center justify-center pl-4 rounded-l-xl border-r-0"
        >
          <span class="material-symbols-outlined text-xl">search</span>
        </div>
        <input
          class="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 border-none bg-slate-100 focus:border-none h-full placeholder:text-slate-500 px-4 rounded-l-none border-l-0 pl-2 text-base font-normal leading-normal"
          placeholder="Search"
          value=""
        />
      </div>
    </label>
    <!-- Mobile menu button -->
    <button
      class="lg:hidden p-2 rounded-md text-slate-700 hover:bg-slate-100"
      (click)="toggleMenu()"
    >
      <span class="material-symbols-outlined text-2xl">menu</span>
    </button>
    @if (accountService.currentUser()) {
      <div class="flex items-center gap-2 shrink-0">
        <button class="relative p-2 text-slate-500 hover:bg-slate-100 rounded-full">
          <span class="material-symbols-outlined">notifications</span
          ><span
            class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white"
          ></span>
        </button>
        <p-menu #menu [model]="items" [popup]="true" appendTo="body" />
        <div
          (click)="onAvatarClick($event, menu)"
          class="w-9 h-9 rounded-full bg-cover bg-center cursor-pointer"
          [style.background-image]="
            'url(' + (accountService.currentUser()?.photoUrl || defaultAvatar) + ')'
          "
        ></div>
      </div>
    } @else {
      <button
        class="bg-primary text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-slate-800 whitespace-nowrap"
        routerLink="/account/login"
      >
        Login
      </button>
    }
  </div>
</header>

<!-- Mobile off-canvas menu -->
<div *ngIf="menuOpen()" class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/30" (click)="closeMenu()"></div>
  <aside class="absolute right-0 top-0 h-full w-72 bg-white shadow-xl p-4 overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3 cursor-pointer" routerLink="/" (click)="closeMenu()">
        <span class="material-symbols-outlined text-3xl text-primary">travel_explore</span>
        <h2 class="text-lg font-bold">TravelScore</h2>
      </div>
      <button class="p-2 rounded-md text-slate-600 hover:bg-slate-100" (click)="closeMenu()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <nav class="flex flex-col gap-2">
      <a
        routerLink="review/destinations"
        (click)="closeMenu()"
        class="px-3 py-2 rounded-md text-slate-800 hover:bg-slate-50"
        >Destinations</a
      >
      <a
        routerLink="review/foods"
        (click)="closeMenu()"
        class="px-3 py-2 rounded-md text-slate-800 hover:bg-slate-50"
        >Food</a
      >
      <a
        routerLink="review/hotels"
        (click)="closeMenu()"
        class="px-3 py-2 rounded-md text-slate-800 hover:bg-slate-50"
        >Hotels</a
      >
      <a
        routerLink="review/flights"
        (click)="closeMenu()"
        class="px-3 py-2 rounded-md text-slate-800 hover:bg-slate-50"
        >Flights</a
      >
      <a
        routerLink="community"
        (click)="closeMenu()"
        class="px-3 py-2 rounded-md text-slate-800 hover:bg-slate-50"
        >Community</a
      >
    </nav>
    <div class="mt-6 border-t pt-4">
      <ng-container *ngIf="accountService.currentUser(); else loggedOut">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-cover"
            [style.background-image]="
              'url(' + (accountService.currentUser()?.photoUrl || defaultAvatar) + ')'
            "
            (click)="closeMenu()"
          ></div>
          <div class="flex flex-col">
            <span class="font-bold">{{ accountService.currentUser()?.userName }}</span>
            <a routerLink="/account/profile" (click)="closeMenu()" class="text-sm text-slate-500"
              >View profile</a
            >
          </div>
        </div>
        <div class="mt-4">
          <button
            class="w-full bg-primary text-white px-3 py-2 rounded-md"
            (click)="logoutAndClose()"
          >
            Logout
          </button>
        </div>
      </ng-container>
      <ng-template #loggedOut>
        <button
          class="w-full bg-primary text-white px-3 py-2 rounded-md"
          routerLink="/account/login"
          (click)="closeMenu()"
        >
          Login
        </button>
      </ng-template>
    </div>
  </aside>
</div>
